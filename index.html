```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        🍽 Recipe Book
    </div>

    <button id="hamburger">☰</button>

    <nav id="nav">
        <a href="#">Home</a>
        <a href="#recipes">Recipes</a>
        <a href="#favorites">Favorites</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Discover Amazing Recipes</h1>
        <p>Browse delicious meals from around the world.</p>
        <button id="openFormBtn">Add New Recipe</button>
    </div>
</section>

<section class="controls">
    <input
        type="text"
        id="searchInput"
        placeholder="Search recipes..."
    >

    <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="breakfast">Breakfast</option>
        <option value="lunch">Lunch</option>
        <option value="dinner">Dinner</option>
        <option value="dessert">Dessert</option>
        <option value="snack">Snack</option>
    </select>
</section>

<main id="recipes">
    <div id="recipeGrid"></div>
</main>

<!-- ADD RECIPE MODAL -->
<div id="modalOverlay">

    <div class="modal">

        <button id="modalClose">✖</button>

        <h2>Add Recipe</h2>

        <input
            type="text"
            id="recipeName"
            placeholder="Recipe Name"
        >

        <select id="recipeCategory">
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
            <option value="dessert">Dessert</option>
            <option value="snack">Snack</option>
        </select>

        <input
            type="text"
            id="recipeCuisine"
            placeholder="Cuisine"
        >

        <textarea
            id="recipeIngredients"
            placeholder="One ingredient per line"
        ></textarea>

        <textarea
            id="recipeInstructions"
            placeholder="Instructions"
        ></textarea>

        <button id="saveRecipeBtn">
            Save Recipe
        </button>

    </div>

</div>

<!-- SHOPPING LIST PANEL -->
<div id="shoppingPanel">

    <button id="closeShoppingPanel">
        Close
    </button>

    <h2>Shopping List</h2>

    <div id="shoppingItems"></div>

</div>

<script src="script.js"></script>

</body>
</html>
```
